# =====================================================================
# Razkindo2 ERP - Docker Compose for CasaOS
# =====================================================================
# Usage:
#   1. Copy .env from template (install script does this automatically)
#   2. Fill in all credentials in .env
#   3. Run: docker compose up -d
#
# CasaOS Install:
#   bash install-casaos.sh
#   (or manually place in /DATA/AppData/razkindo2-erp/)
# =====================================================================

services:
  razkindo-erp:
    build: .
    image: razkindo2-erp:latest
    container_name: razkindo2-erp
    restart: unless-stopped
    ports:
      - "8180:3000"   # Next.js web app (external:internal)
      # Port 3004 (event-queue) is internal only
    env_file:
      - .env
    environment:
      # Override defaults for container runtime
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=768
    volumes:
      # Persist local database file (if using SQLite fallback)
      - razkindo_data:/app/db
    labels:
      # CasaOS App Store metadata
      - "casaos.app.name=Razkindo2 ERP"
      - "casaos.app.icon=mdi:office-building"
      - "casaos.app.description=Sistem ERP Razkindo - Penjualan, Keuangan, dan Manajemen"
      - "casaos.app.port=8180"
    networks:
      - razkindo_net

volumes:
  razkindo_data:
    driver: local

networks:
  razkindo_net:
    driver: bridge
